<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoodTaskTracker - Проекты</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css?v=base6">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/spaces.css?v=authflow7">
</head>
<body data-theme="dark">
  <div class="app-shell" id="app-shell">
    <div class="page">
      <section class="spaces-home" id="spaces-home">
        <div class="spaces-account" id="spaces-account">
          <div class="spaces-account-main">
            <div class="spaces-account-avatar" id="spaces-account-avatar">GT</div>
            <div class="spaces-account-meta">
              <span class="spaces-account-kicker">Текущий аккаунт</span>
              <strong id="spaces-account-name">Аккаунт</strong>
              <span id="spaces-account-email">account@example.com</span>
            </div>
          </div>
          <div class="spaces-account-actions" aria-label="Действия">
            <button class="icon-btn spaces-notifications-btn" id="notifications-toggle" type="button" aria-label="Открыть уведомления" title="Уведомления" aria-expanded="false" aria-controls="notifications-panel">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
              </svg>
            </button>

            <button class="icon-btn spaces-settings-btn" id="settings-toggle" type="button" aria-label="Открыть настройки" title="Настройки" aria-expanded="false" aria-controls="settings-panel">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M10.343 3.94c.09-.542.56-.94 1.11-.94h1.094c.55 0 1.02.398 1.11.94l.149.894a1.486 1.486 0 0 0 2.196 1.053l.771-.436a1.125 1.125 0 0 1 1.547.42l.547.94a1.125 1.125 0 0 1-.301 1.504l-.764.591a1.485 1.485 0 0 0-.434 1.618l.343.835a1.5 1.5 0 0 0 1.429.95h.98c.616 0 1.118.49 1.118 1.095v1.094c0 .605-.502 1.095-1.118 1.095h-.98a1.5 1.5 0 0 0-1.429.95l-.343.835a1.485 1.485 0 0 0 .434 1.618l.764.591a1.125 1.125 0 0 1 .301 1.504l-.547.94a1.125 1.125 0 0 1-1.547.42l-.771-.436a1.486 1.486 0 0 0-2.196 1.053l-.149.894c-.09.542-.56.94-1.11.94h-1.094c-.55 0-1.02-.398-1.11-.94l-.149-.894a1.486 1.486 0 0 0-2.196-1.053l-.771.436a1.125 1.125 0 0 1-1.547-.42l-.547-.94a1.125 1.125 0 0 1 .301-1.504l.764-.591a1.485 1.485 0 0 0 .434-1.618l-.343-.835a1.5 1.5 0 0 0-1.429-.95h-.98A1.11 1.11 0 0 1 2 13.905v-1.094c0-.605.502-1.095 1.118-1.095h.98a1.5 1.5 0 0 0 1.429-.95l.343-.835a1.485 1.485 0 0 0-.434-1.618l-.764-.591a1.125 1.125 0 0 1-.301-1.504l.547-.94a1.125 1.125 0 0 1 1.547-.42l.771.436a1.486 1.486 0 0 0 2.196-1.053l.149-.894z"/>
                <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="spaces-head">
          <div>
            <span class="spaces-kicker">Проекты</span>
            <h2>Ваши проекты</h2>
          </div>
        </div>

        <div class="spaces-grid" id="spaces-grid"></div>
      </section>
    </div>

    <aside class="settings-panel" id="settings-panel" aria-hidden="true">
      <div class="settings-panel-inner">
        <div class="settings-panel-header">
          <div class="settings-panel-header-row">
            <h3 class="settings-panel-title">Настройки</h3>
            <button class="ghost-btn settings-logout-btn" id="logout-btn" type="button">Выйти</button>
          </div>
          <span class="settings-panel-sub">Аккаунт и оформление</span>
        </div>

        <section class="settings-section" aria-label="Настройки аккаунта">
          <span class="settings-section-title">Аккаунт</span>
          <label class="settings-field">
            <span class="settings-label">Никнейм</span>
            <input id="settings-nickname" type="text" placeholder="Без имени" maxlength="60" autocomplete="nickname">
          </label>

          <div class="settings-avatar-row">
            <div class="avatar settings-avatar" id="settings-avatar-preview" role="img" aria-label="Аватар аккаунта">
              <span>GT</span>
            </div>
            <div class="settings-avatar-actions">
              <button class="ghost-btn" id="settings-avatar-btn" type="button">Изменить</button>
              <button class="ghost-btn" id="settings-avatar-clear" type="button">Очистить</button>
            </div>
            <input id="settings-avatar-input" type="file" accept="image/*" hidden>
          </div>
        </section>

        <section class="settings-section" aria-label="Настройки темы">
          <span class="settings-section-title">Тема</span>
          <div class="settings-theme-row" role="group" aria-label="Тема">
            <button class="ghost-btn" id="settings-theme-dark" type="button">Тёмная</button>
            <button class="ghost-btn" id="settings-theme-light" type="button">Светлая</button>
          </div>
        </section>
      </div>
    </aside>

    <aside class="notifications-panel" id="notifications-panel" aria-hidden="true">
      <div class="notifications-panel-inner">
        <div class="settings-panel-header">
          <div class="settings-panel-header-row">
            <h3 class="settings-panel-title">Уведомления</h3>
            <button class="icon-btn" id="notifications-close" type="button" aria-label="Закрыть уведомления" title="Закрыть">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 7l10 10M17 7L7 17" />
              </svg>
            </button>
          </div>
          <span class="settings-panel-sub">Последние события</span>
        </div>

        <section class="settings-section" aria-label="Список уведомлений">
          <div class="notifications-panel-actions">
            <button class="ghost-btn notifications-mark-all" id="notifications-mark-all" type="button">Прочитать все</button>
          </div>
          <div class="notifications-list" id="notifications-list" hidden></div>
          <div class="notifications-empty" id="notifications-empty">Пока нет уведомлений.</div>
        </section>
      </div>
    </aside>
  </div>

  <div class="task-modal" id="space-modal" hidden>
    <div class="task-modal-backdrop" data-close-space-modal></div>
    <div class="task-modal-card" role="dialog" aria-modal="true" aria-labelledby="space-modal-title">
      <div class="task-modal-header">
        <div>
          <span class="task-modal-kicker">Проект</span>
          <h3 class="task-modal-title" id="space-modal-title">Создать проект</h3>
        </div>
      </div>
      <form class="task-form" id="space-form">
        <label class="task-field">
          <span class="task-label">Название проекта</span>
          <input id="space-name" name="name" type="text" required placeholder="Команда дизайна" maxlength="120">
        </label>
        <div class="task-form-actions">
          <button class="ghost-btn" type="button" data-close-space-modal>Отмена</button>
          <button class="primary-btn" type="submit">Создать</button>
        </div>
      </form>
    </div>
  </div>

  <input id="space-avatar-input" type="file" accept="image/*" hidden>

  <script type="module" src="js/spaces/main.js?v=authflow9"></script>
</body>
</html>
