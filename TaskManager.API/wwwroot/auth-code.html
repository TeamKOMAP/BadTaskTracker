<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoodTaskTracker - Подтверждение почты</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css?v=base6">
  <link rel="stylesheet" href="css/components.css?v=comp2">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body data-theme="dark">
  <div class="app-shell">
    <div class="page auth-page">
      <header class="auth-topbar">
        <div class="auth-brand">
          <div class="auth-mark">GT</div>
          <div class="auth-brand-text">
            <span class="auth-kicker">GoodTaskTracker</span>
            <h1 class="auth-title">Подтверждение почты</h1>
          </div>
        </div>
        <button class="icon-btn" id="theme-toggle" type="button" aria-label="Переключить тему" title="Переключить тему">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3v2" />
            <path d="M12 19v2" />
            <path d="M4.22 4.22l1.42 1.42" />
            <path d="M18.36 18.36l1.42 1.42" />
            <path d="M3 12h2" />
            <path d="M19 12h2" />
            <path d="M4.22 19.78l1.42-1.42" />
            <path d="M18.36 5.64l1.42-1.42" />
            <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" />
          </svg>
        </button>
      </header>

      <main class="auth-main">
        <section class="auth-card" aria-label="Подтверждение кода">
          <span class="auth-card-kicker">Шаг 2 из 2</span>
          <h2 class="auth-card-title">Введите код</h2>
          <p class="auth-card-sub">Мы отправили одноразовый код на почту:</p>

          <div class="auth-meta">
            <div class="auth-email-pill" title="Почта">
              <span>Почта:</span>
              <strong id="email-value">name@example.com</strong>
            </div>
            <a class="auth-back" id="change-email" href="auth-email.html">&lt; Изменить почту</a>
            <div class="auth-inline-alert" id="email-validation" hidden></div>
          </div>

          <div class="auth-divider"></div>

          <form class="auth-form" id="code-form">
            <label class="task-field">
              <span class="task-label">Код подтверждения</span>
              <input class="auth-code-input" id="code" name="code" type="text" inputmode="numeric" autocomplete="one-time-code" minlength="4" maxlength="8" placeholder="123456">
            </label>

            <div class="auth-inline-alert" id="code-alert" hidden></div>

            <div class="auth-resend-row">
              <span class="auth-timer" id="timer" aria-live="polite">01:00</span>
              <button class="ghost-btn" id="resend" type="button" disabled>Отправить ещё раз</button>
            </div>

            <div class="auth-actions">
              <button class="primary-btn" id="confirm-code" type="submit">Войти</button>
            </div>
          </form>
        </section>
      </main>

      <footer class="app-footer" aria-label="Футер">
        <div class="app-footer-main">
          <a class="app-footer-gh" href="https://github.com/TeamKOMAP" target="_blank" rel="noopener noreferrer" aria-label="GitHub TeamKOMAP" title="GitHub">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2C6.477 2 2 6.498 2 12.053c0 4.445 2.865 8.214 6.839 9.545.5.094.682-.217.682-.482 0-.238-.009-.868-.014-1.704-2.782.61-3.369-1.35-3.369-1.35-.455-1.168-1.11-1.48-1.11-1.48-.908-.628.069-.616.069-.616 1.003.071 1.531 1.036 1.531 1.036.892 1.54 2.341 1.095 2.91.837.091-.65.35-1.095.636-1.347-2.22-.255-4.555-1.12-4.555-4.986 0-1.101.39-2.002 1.029-2.706-.103-.255-.446-1.283.098-2.673 0 0 .84-.27 2.75 1.034a9.4 9.4 0 0 1 2.504-.34c.85.004 1.705.116 2.504.34 1.909-1.304 2.748-1.034 2.748-1.034.546 1.39.203 2.418.1 2.673.64.704 1.028 1.605 1.028 2.706 0 3.876-2.339 4.728-4.566 4.978.36.312.68.929.68 1.873 0 1.352-.012 2.443-.012 2.775 0 .268.18.58.688.481A10.01 10.01 0 0 0 22 12.053C22 6.498 17.523 2 12 2z"/>
            </svg>
          </a>
        </div>
        <div class="app-footer-bar">
          <span>Copyright © 2026</span>
          <span>made by <a href="https://github.com/TeamKOMAP" target="_blank" rel="noopener noreferrer">TeamKomap</a></span>
        </div>
      </footer>
    </div>
  </div>

  <script type="module" src="js/auth/code.js?v=auth9"></script>
</body>
</html>
