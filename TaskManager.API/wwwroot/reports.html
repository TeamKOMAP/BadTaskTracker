<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GoodTaskTracker - Отчеты</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css?v=base6">
  <link rel="stylesheet" href="css/components.css?v=comp2">
  <link rel="stylesheet" href="css/workspace.css?v=perf36">
  <link rel="stylesheet" href="css/reports.css?v=rep5">
</head>

<body data-theme="dark">
  <div class="app-shell" id="app-shell">
    <div class="page">
      <header class="topbar">
        <div class="brand-stack">
          <button class="brand-mark" id="workspace-avatar" type="button" aria-label="Аватар проекта">GT</button>
          <div class="brand" aria-label="Отчеты">
            <div class="brand-text">
              <span class="brand-kicker">Проект</span>
              <span class="brand-title" id="reports-workspace-name">Отчеты</span>
            </div>
          </div>
          <a class="spaces-back-link" id="back-to-workspace" href="workspace.html" aria-label="Назад к проекту">&lt; Назад</a>
        </div>

        <div class="topbar-right">
          <div class="reports-meta" id="reports-meta">
            <span class="user-label">Обновлено</span>
            <span class="user-name" id="reports-updated">-</span>
          </div>
        </div>
      </header>

      <main class="reports" aria-label="Отчеты">
        <section class="report-card" aria-label="Отчеты по статусам">
          <header class="report-head">
            <h2 class="report-title">Статусы</h2>
            <span class="report-sub">Только статусы, которые есть в проекте сейчас</span>
          </header>
          <div class="report-body">
            <div class="report-chart" id="report-statuses-chart" aria-label="Диаграмма статусов"></div>
            <div class="status-grid" id="report-statuses"></div>
            <div class="report-empty" id="report-statuses-empty" hidden>Нет задач.</div>
          </div>
        </section>

        <section class="report-card" aria-label="Просрочено">
          <header class="report-head">
            <h2 class="report-title">Просрочено</h2>
            <span class="report-sub">Исполнитель, просрочено, задачи</span>
          </header>
          <div class="report-body">
            <div class="report-chart" id="report-overdue-chart" aria-label="Диаграмма просрочек"></div>
            <div class="report-note" id="report-overdue-note" hidden></div>
            <div class="overdue-list" id="report-overdue"></div>
            <div class="report-empty" id="report-overdue-empty" hidden>Нет просроченных задач.</div>
          </div>
        </section>

        <section class="report-card" aria-label="Среднее время выполнения">
          <header class="report-head">
            <h2 class="report-title">Среднее время выполнения</h2>
            <span class="report-sub">От добавления до выполнения</span>
          </header>
          <div class="report-body">
            <div class="metric" id="report-avg">
              <div class="metric-value" id="report-avg-value">-</div>
              <div class="metric-sub" id="report-avg-sub">-</div>
            </div>
            <div class="report-chart" id="report-avg-chart" aria-label="Диаграмма времени выполнения"></div>
          </div>
        </section>
      </main>

      <div class="reports-toast" id="reports-toast" hidden></div>

      <footer class="app-footer" aria-label="Футер">
        <div class="app-footer-bar">
          <a class="app-footer-gh" href="https://github.com/TeamKOMAP/BadTaskTracker" target="_blank" rel="noopener noreferrer" aria-label="GitHub TeamKOMAP" title="GitHub">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2C6.477 2 2 6.498 2 12.053c0 4.445 2.865 8.214 6.839 9.545.5.094.682-.217.682-.482 0-.238-.009-.868-.014-1.704-2.782.61-3.369-1.35-3.369-1.35-.455-1.168-1.11-1.48-1.11-1.48-.908-.628.069-.616.069-.616 1.003.071 1.531 1.036 1.531 1.036.892 1.54 2.341 1.095 2.91.837.091-.65.35-1.095.636-1.347-2.22-.255-4.555-1.12-4.555-4.986 0-1.101.39-2.002 1.029-2.706-.103-.255-.446-1.283.098-2.673 0 0 .84-.27 2.75 1.034a9.4 9.4 0 0 1 2.504-.34c.85.004 1.705.116 2.504.34 1.909-1.304 2.748-1.034 2.748-1.034.546 1.39.203 2.418.1 2.673.64.704 1.028 1.605 1.028 2.706 0 3.876-2.339 4.728-4.566 4.978.36.312.68.929.68 1.873 0 1.352-.012 2.443-.012 2.775 0 .268.18.58.688.481A10.01 10.01 0 0 0 22 12.053C22 6.498 17.523 2 12 2z"/>
            </svg>
          </a>
          <span>Copyright © 2026</span>
          <span>made by <a href="https://github.com/TeamKOMAP" target="_blank" rel="noopener noreferrer">тЮМЕНЬ</a></span>
        </div>
      </footer>
    </div>
  </div>

  <script type="module" src="js/reports/main.js?v=rep9"></script>
</body>
</html>
