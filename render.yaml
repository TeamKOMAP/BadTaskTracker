services:
  - type: web
    runtime: docker
    name: badtasktracker-api
    plan: starter
    region: frankfurt
    dockerfilePath: TaskManager.API/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "10000"
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: ASPNETCORE_FORWARDEDHEADERS_ENABLED
        value: "true"
      - key: Database__Provider
        value: Postgres
      - key: ConnectionStrings__Postgres
        fromDatabase:
          name: badtasktracker-postgres
          property: connectionString
      - key: DatabaseStartup__ApplyMigrations
        value: "true"
      - key: DatabaseStartup__Seed
        value: "false"
      - key: DatabaseStartup__MigrateLegacyFiles
        value: "false"
      - key: Jwt__Issuer
        value: GoodTaskTracker
      - key: Jwt__Audience
        value: GoodTaskTracker.Client
      - key: Jwt__SigningKey
        sync: false
      - key: Storage__Provider
        value: S3
      - key: Storage__PublicBucket
        value: gtt-public
      - key: Storage__PrivateBucket
        value: gtt-private
      - key: Storage__Endpoint
        value: http://badtasktracker-minio:10000
      - key: Storage__Region
        value: us-east-1
      - key: Storage__ForcePathStyle
        value: "true"
      - key: Storage__AccessKey
        fromService:
          name: badtasktracker-minio
          type: pserv
          envVarKey: MINIO_ROOT_USER
      - key: Storage__SecretKey
        fromService:
          name: badtasktracker-minio
          type: pserv
          envVarKey: MINIO_ROOT_PASSWORD
      - key: Email__Provider
        value: HttpApi
      - key: Email__HttpApi__Provider
        value: Resend
      - key: Email__HttpApi__BaseUrl
        value: https://api.resend.com
      - key: Email__HttpApi__SendPath
        value: /emails
      - key: Email__HttpApi__FromName
        value: BadTaskTracker
      - key: Email__HttpApi__ApiKey
        sync: false
      - key: Email__HttpApi__FromEmail
        sync: false
    disk:
      name: api-data
      mountPath: /var/data
      sizeGB: 5

  - type: pserv
    runtime: image
    name: badtasktracker-minio
    plan: starter
    region: frankfurt
    image:
      url: quay.io/minio/minio:latest
    dockerCommand: minio server /data --address :10000 --console-address :10001
    envVars:
      - key: PORT
        value: "10000"
      - key: MINIO_ROOT_USER
        value: btt-minio-root
      - key: MINIO_ROOT_PASSWORD
        sync: false
    disk:
      name: minio-data
      mountPath: /data
      sizeGB: 20

databases:
  - name: badtasktracker-postgres
    plan: starter
    region: frankfurt
    databaseName: badtasktracker
    user: badtasktracker
