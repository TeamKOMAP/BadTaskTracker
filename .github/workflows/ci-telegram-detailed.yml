name: 🚀 CI/CD with Detailed Telegram Notifications

on:
  push:
    branches: [ main, develop, helpme, feature/* ]
  pull_request:
    branches: [ main, develop, helpme ]
    types: [opened, synchronize, closed]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Get Changed Files
      id: changed-files
      uses: tj-actions/changed-files@v42
      with:
        json: true
        json_raw_format: true
    
    - name: Get Commit Info
      id: commit-info
      run: |
        echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
        echo "files_changed=$(echo '${{ steps.changed-files.outputs.all_changed_files }}' | jq 'length')" >> $GITHUB_OUTPUT
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Restore dependencies
      id: restore
      run: dotnet restore
      continue-on-error: true
    
    - name: Build
      id: build
      run: dotnet build --no-restore --configuration Release 2>&1 | tee build.log
      continue-on-error: true
    
    - name: Count Warnings
      id: warnings
      if: always()
      run: |
        WARNINGS=$(grep -c "warning" build.log 2>/dev/null || echo "0")
        echo "count=${WARNINGS}" >> $GITHUB_OUTPUT
    
    - name: Run Tests
      id: test
      run: |
        dotnet test --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" 2>&1 | tee test.log
        echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
      continue-on-error: true
    
    - name: Parse Test Results
      id: parse
      if: always()
      run: |
        TRX_FILE=$(find . -name "test-results.trx" -type f 2>/dev/null | head -1)
        if [ -n "$TRX_FILE" ] && [ -f "$TRX_FILE" ]; then
          TOTAL=$(grep -oP 'total="\K[0-9]+' "$TRX_FILE" | head -1)
          PASSED=$(grep -oP 'passed="\K[0-9]+' "$TRX_FILE" | head -1)
          FAILED=$(grep -oP 'failed="\K[0-9]+' "$TRX_FILE" | head -1)
          SKIPPED=$(grep -oP 'skipped="\K[0-9]+' "$TRX_FILE" | head -1)
          
          echo "total=${TOTAL:-0}" >> $GITHUB_OUTPUT
          echo "passed=${PASSED:-0}" >> $GITHUB_OUTPUT
          echo "failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "skipped=${SKIPPED:-0}" >> $GITHUB_OUTPUT
        else
          echo "total=0" >> $GITHUB_OUTPUT
          echo "passed=0" >> $GITHUB_OUTPUT
          echo "failed=0" >> $GITHUB_OUTPUT
          echo "skipped=0" >> $GITHUB_OUTPUT
        fi
    
    - name: Send Telegram Notification
      if: always()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        format: markdown
        message: |
          ${{ steps.test.outputs.exit_code == '0' && steps.build.outcome == 'success' && '✅ *СБОРКА УСПЕШНА*' || '❌ *СБОРКА ПРОВАЛЕНА*' }}
          
          📁 *Проект:* ${{ github.repository }}
          ${{ github.event_name == 'pull_request' && '🔀 Pull Request #' || '🔨 Push' }}${{ github.event.pull_request.number || '' }}
          🌿 *Ветка:* ${{ github.ref_name }}
          👤 *Разработчик:* ${{ github.actor }}
          🔖 *Коммит:* ${{ steps.commit-info.outputs.sha_short }}
          
          📝 *Сообщение:*
          ${{ github.event.head_commit.message || github.event.pull_request.title }}
          
          📊 *Статистика:*
          📄 Файлов изменено: ${{ steps.commit-info.outputs.files_changed }}
          
          🧪 *Тесты:*
          • Всего: ${{ steps.parse.outputs.total }}
          • ✅ Пройдено: ${{ steps.parse.outputs.passed }}
          • ❌ Провалено: ${{ steps.parse.outputs.failed }}
          • ⏭️ Пропущено: ${{ steps.parse.outputs.skipped }}
          
          ⚠️ Warnings: ${{ steps.warnings.outputs.count }}
          
          🔧 *Статус:*
          Restore: ${{ steps.restore.outcome == 'success' && '✅' || '❌' }}
          Build: ${{ steps.build.outcome == 'success' && '✅' || '❌' }}
          Test: ${{ steps.test.outputs.exit_code == '0' && '✅' || '❌' }}
          
          🔗 [Смотреть детали](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
    
    - name: Fail if build or tests failed
      if: steps.build.outcome == 'failure' || steps.test.outputs.exit_code != '0'
      run: exit 1
