name: 🚀 CI/CD with Telegram

on:
  push:
    branches: [ main, develop, helpme, feature/* ]
  pull_request:
    branches: [ main, develop, helpme ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    
    - name: Get Commit Stats
      id: stats
      run: |
        echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
        
        # Статистика строк
        git diff --stat HEAD~1 HEAD > diffstat.txt 2>/dev/null || echo "" > diffstat.txt
        ADDED=$(grep -oE '[0-9]+ insertions' diffstat.txt | grep -oE '[0-9]+' || echo "0")
        REMOVED=$(grep -oE '[0-9]+ deletions' diffstat.txt | grep -oE '[0-9]+' || echo "0")
        echo "added=${ADDED}" >> $GITHUB_OUTPUT
        echo "removed=${REMOVED}" >> $GITHUB_OUTPUT
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore
      run: dotnet restore
    
    - name: Build
      id: build
      run: dotnet build --no-restore --configuration Release
    
    - name: Test
      id: test
      run: dotnet test --no-build --logger "trx;LogFileName=test-results.trx"
    
    - name: Parse Results
      id: parse
      if: always()
      run: |
        TRX=$(find . -name "test-results.trx" 2>/dev/null | head -1)
        if [ -f "$TRX" ]; then
          echo "total=$(grep -oP 'total="\K[0-9]+' "$TRX" | head -1 || echo 0)" >> $GITHUB_OUTPUT
          echo "passed=$(grep -oP 'passed="\K[0-9]+' "$TRX" | head -1 || echo 0)" >> $GITHUB_OUTPUT
          echo "failed=$(grep -oP 'failed="\K[0-9]+' "$TRX" | head -1 || echo 0)" >> $GITHUB_OUTPUT
        else
          echo "total=0" >> $GITHUB_OUTPUT
          echo "passed=0" >> $GITHUB_OUTPUT
          echo "failed=0" >> $GITHUB_OUTPUT
        fi
    
    - name: Build Time
      id: time
      run: echo "duration=$(( $(date +%s) - ${{ github.run_started_at }} ))" >> $GITHUB_OUTPUT
      continue-on-error: true
    
    - name: Notify Telegram
      if: always()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        format: markdown
        message: |
          ${{ job.status == 'success' && '✅ УСПЕХ' || '❌ ПРОВАЛ' }}
          
          ${{ github.repository }}
          ${{ github.event_name == 'pull_request' && format('🔀 PR #{0}: {1}', github.event.pull_request.number, github.event.pull_request.title) || format('🔨 Push to {0}', github.ref_name) }}
          
          👤 ${{ github.actor }} | 🔖 ${{ steps.stats.outputs.sha_short }}
          
          📊 Изменения: +${{ steps.stats.outputs.added }} -${{ steps.stats.outputs.removed }}
          
          🧪 Тесты: ${{ steps.parse.outputs.passed }}/${{ steps.parse.outputs.total }} ${{ steps.parse.outputs.failed > 0 && format('(❌ {0} failed)', steps.parse.outputs.failed) || '' }}
          
          ⏱️ Время: ${{ github.run_duration }} сек
          
          [Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
