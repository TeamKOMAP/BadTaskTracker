name: 🚀 CI/CD with Telegram

on:
  push:
    branches: [ main, dev, feature/* ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    env:
      DatabaseStartup__ApplyMigrations: false
      DatabaseStartup__Seed: false
    
    outputs:
      test_result: ${{ steps.test.outputs.result }}
      test_passed: ${{ steps.test.outputs.passed }}
      test_failed: ${{ steps.test.outputs.failed }}
      failed_tests: ${{ steps.test.outputs.failed_tests }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    - name: Test
      id: test
      run: |
        dotnet test --no-build --configuration Release --logger "trx;LogFileName=results.trx" --results-directory ./TestResults 2>&1 | tee test-output.txt
        exit_code=${PIPESTATUS[0]}
        trx_file=$(find ./TestResults -name "*.trx" | head -1)
        
        if [ -f "$trx_file" ]; then
          total=$(xmllint --xpath "string(//*[local-name()='Counters']/@total)" "$trx_file" 2>/dev/null || echo "0")
          passed=$(xmllint --xpath "string(//*[local-name()='Counters']/@passed)" "$trx_file" 2>/dev/null || echo "0")
          failed=$(xmllint --xpath "string(//*[local-name()='Counters']/@failed)" "$trx_file" 2>/dev/null || echo "0")
          
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "failed=$failed" >> $GITHUB_OUTPUT
          
          if [ "$failed" -gt 0 ]; then
            failed_names=$(xmllint --xpath "//*[local-name()='UnitTestResult'][@outcome='Failed']//*[local-name()='testName']/text()" "$trx_file" 2>/dev/null | head -10 | tr '\n' '|' | sed 's/|$//')
            echo "failed_tests=$failed_names" >> $GITHUB_OUTPUT
            echo "result=failed" >> $GITHUB_OUTPUT
          else
            echo "failed_tests=" >> $GITHUB_OUTPUT
            echo "result=success" >> $GITHUB_OUTPUT
          fi
        else
          echo "total=0" >> $GITHUB_OUTPUT
          echo "passed=0" >> $GITHUB_OUTPUT
          echo "failed=0" >> $GITHUB_OUTPUT
          echo "failed_tests=" >> $GITHUB_OUTPUT
          echo "result=error" >> $GITHUB_OUTPUT
        fi
        
        exit $exit_code
      continue-on-error: true
      shell: bash
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: './TestResults/*.trx'
        retention-days: 7

  notify-telegram:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Build message
      id: build_msg
      env:
        RESULT: ${{ needs.build-and-test.outputs.test_result }}
        PASSED: ${{ needs.build-and-test.outputs.test_passed }}
        FAILED: ${{ needs.build-and-test.outputs.test_failed }}
        FAILED_TESTS: ${{ needs.build-and-test.outputs.failed_tests }}
        REPO: ${{ github.repository }}
        EVENT: ${{ github.event_name }}
        BRANCH: ${{ github.ref_name }}
        ACTOR: ${{ github.actor }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        if [ "$RESULT" = "success" ]; then
          header="✅ *ВСЕ ТЕСТЫ ПРОЙДЕНЫ*"
          stats="📊 Тестов: $PASSED"
        elif [ "$RESULT" = "failed" ]; then
          header="❌ *ТЕСТЫ ПРОВАЛЕНЫ*"
          stats="📊 Пройдено: $PASSED | Упало: $FAILED"
        else
          header="⚠️ *ОШИБКА СБОРКИ*"
          stats=""
        fi
        
        event_icon="🔨"
        [ "$EVENT" = "pull_request" ] && event_icon="🔀"
        
        echo "header=$header" >> $GITHUB_OUTPUT
        echo "stats=$stats" >> $GITHUB_OUTPUT
        echo "event_icon=$event_icon" >> $GITHUB_OUTPUT
        echo "repo=$REPO" >> $GITHUB_OUTPUT
        echo "branch=$BRANCH" >> $GITHUB_OUTPUT
        echo "actor=$ACTOR" >> $GITHUB_OUTPUT
        echo "run_url=$RUN_URL" >> $GITHUB_OUTPUT
        
        if [ -n "$FAILED_TESTS" ] && [ "$FAILED" -gt 0 ]; then
          failed_msg="💥 Упавшие тесты:"
          IFS='|' read -ra TESTS <<< "$FAILED_TESTS"
          count=0
          for test in "${TESTS[@]}"; do
            if [ $count -ge 5 ]; then
              remaining=$((FAILED - 5))
              failed_msg="$failed_msg
        ... и ещё $remaining тестов"
              break
            fi
            short=$(echo "$test" | sed 's/TaskManager\.Tests\.IntegrationTests\.//' | sed 's/TaskManager\.Tests\.UnitTests\.//')
            failed_msg="$failed_msg
        • $short"
            ((count++))
          done
          echo "failed_list=$failed_msg" >> $GITHUB_OUTPUT
        else
          echo "failed_list=" >> $GITHUB_OUTPUT
        fi
    
    - name: Notify Telegram
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        format: markdown
        message: |
          ${{ steps.build_msg.outputs.header }}
          
          📁 ${{ steps.build_msg.outputs.repo }}
          ${{ steps.build_msg.outputs.event_icon }} to `${{ steps.build_msg.outputs.branch }}`
          
          👤 ${{ steps.build_msg.outputs.actor }}
          ${{ steps.build_msg.outputs.stats }}
          ${{ steps.build_msg.outputs.failed_list }}
          
          [📄 Лог сборки](${{ steps.build_msg.outputs.run_url }})
