name: .NET CI

on:
  push:
    branches: [ main, dev, feature/* ]
  pull_request:
    branches: [ main, dev, feature/* ]

jobs:
  build-and-test:
    runs-on: windows-latest
    
    env:
      DatabaseStartup__ApplyMigrations: false
      DatabaseStartup__Seed: false
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Check workspace DOM ids
      run: node tools/frontend/check-workspace-dom-ids.mjs

    - name: Workspace frontend smoke contract
      run: node tools/frontend/smoke-workspace-contract.mjs

    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    - name: Run tests
      run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/TestResults/*.trx'
        retention-days: 7
